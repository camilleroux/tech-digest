name: Feature Request
description: Suggest a feature or new RSS source
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: If proposing a source, paste the RSS URL
      placeholder: "https://example.com/feed.rss"
